name: CI

# Local gate composing single-purpose reusable workflows (biome / typecheck / test
# / build / checks / report-failure) via `./` refs — each is `on: workflow_call`.
# Adapted from dufflebag's templates (ADR 0002).
#
# - `CI Gate` is the single aggregated status check: require it in branch protection
#   so a red leg blocks merges.
# - `report-failure` opens/updates a ci-failure issue when master goes red (never for
#   PRs).
# - E2E is opt-in: this repo drives Playwright but its tests use fakes; wire e2e.yml
#   in once a `test:e2e` script exists.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  biome:
    uses: ./.github/workflows/biome.yml

  typecheck:
    uses: ./.github/workflows/typecheck.yml

  test:
    uses: ./.github/workflows/test.yml

  build:
    uses: ./.github/workflows/build.yml

  checks:
    uses: ./.github/workflows/checks.yml

  # e2e:
  #   uses: ./.github/workflows/e2e.yml

  gate:
    name: CI Gate
    needs: [biome, typecheck, test, build, checks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require every gate to pass
        run: |
          echo "biome=${{ needs.biome.result }} typecheck=${{ needs.typecheck.result }} test=${{ needs.test.result }} build=${{ needs.build.result }} checks=${{ needs.checks.result }}"
          test "${{ needs.biome.result }}" = "success" \
            && test "${{ needs.typecheck.result }}" = "success" \
            && test "${{ needs.test.result }}" = "success" \
            && test "${{ needs.build.result }}" = "success" \
            && test "${{ needs.checks.result }}" = "success"

  report-failure:
    name: Open issue on master failure
    needs: [biome, typecheck, test, build, checks]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      issues: write
      actions: read
    uses: ./.github/workflows/report-failure.yml
