name: Typecheck

# Single-purpose, reusable (workflow_call): tsc --noEmit. Type results are
# deterministic across OS/Node, so this runs single-leg (ubuntu, one Node).

on:
  workflow_call:

permissions:
  contents: read

jobs:
  typecheck:
    name: Type check
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck
