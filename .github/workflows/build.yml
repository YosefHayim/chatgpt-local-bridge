name: Build

# Single-purpose, reusable (workflow_call): the tsup build across the supported
# matrix (OS x Node), plus a `bridge --help` smoke so a broken CLI registration
# surfaces here.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    if: github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22, 24]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: CLI smoke (--help)
        run: node dist/bridge.js --help
