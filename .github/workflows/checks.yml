name: Checks

# Single-purpose, reusable (workflow_call): the project-specific static checks that
# aren't formatting/typing/tests — class-API surface, JSDoc coverage, and the
# feature-boundary rule (no cross-feature *.class.ts imports). Deterministic, so
# single-leg. See CODE-STYLE.md and ADR 0002.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  checks:
    name: Class API / JSDoc / boundaries
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Class API surface (≤5 public methods)
        run: pnpm run check:class-api

      - name: JSDoc on public methods
        run: pnpm run check:jsdoc

      - name: Feature boundaries (no cross-feature *.class.ts)
        run: pnpm run check:boundaries
