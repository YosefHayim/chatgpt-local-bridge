name: E2E

# Single-purpose, reusable (workflow_call): the end-to-end suite. OPT-IN — not wired
# into ci.yml yet (this repo's tests use fakes, not a real browser). When a
# `test:e2e` script exists, uncomment the `e2e:` job in ci.yml and, since this repo
# drives Playwright, uncomment the browser-install step below.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  e2e:
    name: E2E tests
    if: github.actor != 'dependabot[bot]'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwright drives real Chrome: install browsers before the suite.
      # - name: Install Playwright browsers
      #   run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm run test:e2e
